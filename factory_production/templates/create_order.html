{% extends "base.html" %}
{% block title %}新建指令单{% endblock %}
{% block content %}
<h1 class="page-title">+ 新建生产指令单</h1>

<!-- 指令单类型选择器 -->
<div class="card" style="margin-bottom: 1.5rem; padding: 1rem 1.5rem;">
    <div style="display: flex; gap: 0.8rem; justify-content: flex-start; flex-wrap: wrap;">
        <button type="button" class="order-type-btn {% if order_type == 'blow' %}active{% endif %}" data-type="blow" onclick="switchOrderType('blow')">
            <span style="margin-right: 6px;"></span>吹气指令单
        </button>
        <button type="button" class="order-type-btn {% if order_type == 'pu' %}active{% endif %}" data-type="pu" onclick="switchOrderType('pu')">
            <span style="margin-right: 6px;"></span>PU指令单
        </button>
        <button type="button" class="order-type-btn {% if order_type == 'plastic' %}active{% endif %}" data-type="plastic" onclick="switchOrderType('plastic')">
            <span style="margin-right: 6px;"></span>滴塑指令单
        </button>
        <button type="button" class="order-type-btn {% if order_type == 'assembly' %}active{% endif %}" data-type="assembly" onclick="switchOrderType('assembly')">
            <span style="margin-right: 6px;"></span>成型指令单
        </button>
    </div>
</div>

<div class="card" style="padding: 2rem;">
    <form method="post" id="orderForm">
        <input type="hidden" name="order_type" id="orderTypeInput" value="{{ order_type }}">
        <input type="hidden" name="sole_material_id" id="soleMaterialIdHidden">
        <input type="hidden" name="upper_material_id" id="upperMaterialIdHidden">
        <input type="hidden" name="image_urls" id="imageUrlsInput" value="[]">
        <input type="hidden" name="global_size_start" id="globalSizeStartHidden" value="37">
        <input type="hidden" name="global_size_end" id="globalSizeEndHidden" value="42">

        <!-- 基本信息 -->
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 2rem;">
            <div>
                <label style="font-weight: 600; margin-bottom: 0.5rem;">开单日期</label>
                <input type="date" name="created_date" value="{{ today }}" required
                       style="width: 100%; padding: 0.85rem 1.2rem; border-radius: 20px; border: 1.5px solid #e2e8f0; background: white; font-size: 0.95rem;">
            </div>
            <div id="productCodeWrapper">
                <label style="font-weight: 600; margin-bottom: 0.5rem;">货号 <span style="color: #ef4444;">*</span></label>
                <input type="text" name="product_code" id="productCode" placeholder="例如：XH-2024"
                       style="width: 100%; padding: 0.85rem 1.2rem; border-radius: 20px; border: 1.5px solid #e2e8f0; background: white; font-size: 0.95rem;">
            </div>
            <div id="soleModelWrapper" style="display: none;">
                <label style="font-weight: 600; margin-bottom: 0.5rem;">鞋底型号 <span style="color: #ef4444;">*</span></label>
                <input type="text" name="sole_model" id="soleModel" placeholder="例如：RB-01"
                       style="width: 100%; padding: 0.85rem 1.2rem; border-radius: 20px; border: 1.5px solid #e2e8f0; background: white; font-size: 0.95rem;">
            </div>
            <div id="upperModelWrapper" style="display: none;">
                <label style="font-weight: 600; margin-bottom: 0.5rem;">帮面型号 <span style="color: #ef4444;">*</span></label>
                <input type="text" name="upper_model" id="upperModel" placeholder="例如：MESH-BLK"
                       style="width: 100%; padding: 0.85rem 1.2rem; border-radius: 20px; border: 1.5px solid #e2e8f0; background: white; font-size: 0.95rem;">
            </div>
        </div>

        <!-- 滴塑类型选择 -->
        <div id="plasticTypeWrapper" style="margin-bottom: 2rem; display: none;">
            <label style="font-weight: 600; margin-bottom: 0.5rem;">选择制作类型</label>
            <select name="plastic_type" id="plasticTypeSelect" onchange="togglePlasticModel()" style="width: 220px; padding: 0.85rem 1.2rem; border-radius: 20px; border: 1.5px solid #e2e8f0; background: white; font-size: 0.95rem;">
                <option value="upper"> 帮面</option>
                <option value="sole"> 底片</option>
            </select>
            <p style="font-size:0.8rem; color:#64748b; margin-top:0.3rem;">底片将使用鞋底型号字段记录</p>
        </div>

        <!-- 直接销售 -->
        <div id="directSaleWrapper" style="margin-bottom: 2rem; display: none;">
            <div style="display: flex; align-items: center; justify-content: space-between; background: #f8fafc; border: 1.5px solid #e2e8f0; border-radius: 24px; padding: 1.2rem 1.8rem;">
                <div style="display: flex; align-items: center; gap: 1.2rem;">
                    <div style="width: 56px; height: 56px; background: #fef3c7; border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 2rem;"></div>
                    <div>
                        <div style="font-weight: 700; font-size: 1.2rem; color: #1e293b;">直接销售</div>
                        <div style="font-size: 0.9rem; color: #64748b;">鞋底不经过喷漆，直接出库结算</div>
                    </div>
                </div>
                <label class="toggle-switch">
                    <input type="checkbox" name="direct_sale" value="1">
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <!-- 码段控制栏 + 颜色区域（固定6个码段） -->
        <div style="margin-bottom: 2rem;">
            <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem;">
                <h3 style="margin:0; font-size: 1.3rem; font-weight: 700;"> 颜色及码段数量（双）</h3>
                <div style="display: flex; gap: 0.8rem; align-items: center; background: #f1f5f9; padding: 0.5rem 1.2rem; border-radius: 40px;">
                    <span style="font-weight: 500; color: #475569;">起始码</span>
                    <input type="number" id="globalSizeStart" min="1" max="50" value="37" style="width: 75px; padding: 0.5rem; border-radius: 30px; border: 1.5px solid #e2e8f0; text-align: center; font-weight: 600; background: white;">
                    <span style="color: #94a3b8;">-</span>
                    <span style="font-weight: 500; color: #475569;">结束码</span>
                    <input type="number" id="globalSizeEnd" min="1" max="50" value="42" style="width: 75px; padding: 0.5rem; border-radius: 30px; border: 1.5px solid #e2e8f0; text-align: center; font-weight: 600; background: white;">
                    <span style="margin-left: 0.5rem; font-size:0.85rem; color:#64748b;">码段1~6依次对应</span>
                </div>
            </div>
            <div id="colorsContainer"></div>
            <button type="button" id="addColorBtn" class="btn-outline" style="margin-top: 1rem; padding: 0.8rem 1.8rem; border-radius: 40px; font-weight: 600; background: white; border: 1.5px dashed #2563eb; color: #2563eb;">+ 添加颜色</button>
        </div>

        <!-- 成型来源 -->
        <div id="assemblySourcesWrapper" style="display: none; margin-top: 1rem;">
            <h3 style="font-size: 1.1rem; font-weight: 700; margin-bottom: 1rem;">成型材料来源</h3>
            <!-- 鞋底来源 -->
            <div style="margin-bottom: 1rem; padding: 1rem; background: #f8fafc; border-radius: 16px;">
                <label style="font-weight: 600;">鞋底来源</label>
                <div style="display: flex; gap: 0.5rem; margin-top: 0.5rem; align-items: center;">
                    <select id="soleSource" onchange="onSoleSourceChange()" style="flex:2; padding:0.75rem; border-radius:20px; border:1.5px solid #e2e8f0;">
                        <option value="local_blow">本地吹气</option>
                        <option value="local_pu">本地PU</option>
                        <option value="domestic">国内鞋材</option>
                        <option value="other">其他来源</option>
                    </select>
                    <button type="button" id="selectSoleBtn" class="btn-outline select-material-btn" style="flex:1;" onclick="searchMaterial('sole', this)">选择鞋底材料</button>
                </div>
                <div id="soleMaterialInfo" style="margin-top:0.5rem; padding:0.5rem; background:#eef2ff; border-radius:12px; font-size:0.85rem; display:none;"></div>
            </div>
            <!-- 帮面来源 -->
            <div style="margin-bottom: 1rem; padding: 1rem; background: #f8fafc; border-radius: 16px;">
                <label style="font-weight: 600;">帮面来源</label>
                <div style="display: flex; gap: 0.5rem; margin-top: 0.5rem; align-items: center;">
                    <select id="upperSource" onchange="onUpperSourceChange()" style="flex:2; padding:0.75rem; border-radius:20px; border:1.5px solid #e2e8f0;">
                        <option value="local_plastic">本地滴塑</option>
                        <option value="domestic">国内鞋材</option>
                        <option value="other">其他来源</option>
                    </select>
                    <button type="button" id="selectUpperBtn" class="btn-outline select-material-btn" style="flex:1;" onclick="searchMaterial('upper', this)">选择帮面材料</button>
                </div>
                <div id="upperMaterialInfo" style="margin-top:0.5rem; padding:0.5rem; background:#eef2ff; border-radius:12px; font-size:0.85rem; display:none;"></div>
            </div>
            <!-- 其他来源 -->
            <div style="margin-bottom: 1rem;">
                <label style="font-weight: 600;">其他来源</label>
                <div id="otherSourcesContainer" style="margin-top: 0.5rem;"></div>
                <button type="button" class="btn-outline" style="margin-top: 0.5rem;" onclick="addOtherSourceRow()">+ 添加其他来源</button>
            </div>
        </div>

        <!-- 图片上传 -->
        <div style="margin: 1.5rem 0;">
            <label style="font-weight: 600; margin-bottom: 0.5rem;"> 上传图片（可选）</label>
            <div id="imageUploadContainer" style="display: flex; flex-wrap: wrap; gap: 0.8rem; margin-top: 0.8rem;"></div>
            <div style="display: flex; gap: 0.8rem; align-items: center; margin-top: 0.8rem;">
                <label class="btn-outline" style="cursor: pointer; padding: 0.6rem 1.2rem;">
                    + 选择图片
                    <input type="file" id="imageUploadInput" accept="image/*" multiple style="display: none;">
                </label>
                <span style="color: #64748b; font-size: 0.85rem;">支持多选，每张不超过5MB</span>
            </div>
        </div>

        <!-- 备注 -->
        <div style="margin: 2rem 0 1.5rem;">
            <label style="font-weight: 600; margin-bottom: 0.5rem;">备注</label>
            <textarea name="notes" rows="3" placeholder="选填"
                      style="width: 100%; padding: 1rem 1.2rem; border-radius: 20px; border: 1.5px solid #e2e8f0; background: white; resize: vertical;"></textarea>
        </div>

        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div style="display: flex; gap: 1.2rem; justify-content: flex-end; border-top: 1px solid #e2e8f0; padding-top: 2rem;">
            <a href="{{ url_for('index') }}" class="btn-outline" style="padding:0.9rem 2.5rem; border-radius:40px; font-weight:600; background:white; border:1.5px solid #cbd5e1; color:#334155; text-decoration:none;">取消</a>
            <button type="submit" id="submitBtn" class="btn btn-success" style="padding:0.9rem 3rem; border-radius:40px; font-weight:600; background: linear-gradient(135deg, #10b981, #059669); border:none; box-shadow:0 8px 16px -4px rgba(16,185,129,0.3);"> 创建指令单</button>
        </div>
    </form>
</div>

<!-- 搜索模态框 -->
<div id="materialModal" class="modal">
    <div class="modal-content" style="width: 600px; max-width: 90%;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
            <h3 style="margin:0;"> 选择库存材料</h3>
            <button type="button" onclick="closeModal()" style="background: none; border: none; font-size: 1.5rem; cursor: pointer; color: #64748b;">&times;</button>
        </div>
        <input type="text" id="materialSearchInput" placeholder="搜索货号 / 名称 / 颜色" autocomplete="off"
               style="width: 100%; padding: 1rem 1.2rem; border-radius: 30px; border: 1.5px solid #e2e8f0; margin-bottom: 1.2rem; font-size: 1rem;">
        <div id="materialSearchResults" style="max-height: 400px; overflow-y: auto;"></div>
    </div>
</div>

<style>
    .order-type-btn {
        background: white; border: 1.5px solid #cbd5e1; color: #334155;
        padding: 0.7rem 1.8rem; border-radius: 60px; font-weight: 600; font-size: 1rem;
        cursor: pointer; transition: all 0.2s; box-shadow: 0 2px 6px rgba(0,0,0,0.02);
        display: inline-flex; align-items: center; justify-content: center;
    }
    .order-type-btn:hover { background: #f8fafc; border-color: #2563eb; transform: translateY(-1px); }
    .order-type-btn.active { background: #2563eb; border-color: #2563eb; color: white; box-shadow: 0 8px 16px -4px rgba(37,99,235,0.25); }
    .btn-outline { background: white; border: 1.5px solid #cbd5e1; color: #334155; font-weight: 500; cursor: pointer; }
    .modal {
        display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.3); backdrop-filter: blur(6px);
        justify-content: center; align-items: center; z-index: 1000;
    }
    .modal-content { background: white; padding: 2rem; border-radius: 32px; }
    .color-row {
        background: white; border-radius: 24px; padding: 1.5rem; margin-bottom: 1.2rem;
        border: 1.5px solid #e2e8f0;
    }
    .remove-color-btn {
        background: #fee2e2 !important; color: #ef4444 !important; border: none !important;
        width: 42px; height: 42px; border-radius: 30px !important; font-size: 1.3rem; cursor: pointer;
    }
    .material-item { padding: 1rem 1.2rem; border-bottom: 1px solid #e2e8f0; cursor: pointer; border-radius: 16px; }
    .material-item:hover { background: #eef2ff; }
    .toggle-switch { position: relative; display: inline-block; width: 56px; height: 30px; }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #cbd5e1; transition: .3s; border-radius: 34px; }
    .slider:before { position: absolute; content: ""; height: 24px; width: 24px; left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%; }
    input:checked + .slider { background-color: #f59e0b; }
    input:checked + .slider:before { transform: translateX(26px); }
</style>

<script>
    let colorIndex = 0;
    const container = document.getElementById('colorsContainer');
    let currentSearchType = null;
    let currentSearchBtn = null;
    const modal = document.getElementById('materialModal');
    const searchInput = document.getElementById('materialSearchInput');
    const resultsDiv = document.getElementById('materialSearchResults');
    const uploadedUrls = [];
    const imageContainer = document.getElementById('imageUploadContainer');
    const fileInput = document.getElementById('imageUploadInput');
    const urlsInput = document.getElementById('imageUrlsInput');

    let searchTimer;
    let abortController = null;

    // 获取当前设定的码段范围
    function getSizeRange() {
        let s = parseInt(document.getElementById('globalSizeStart').value) || 37;
        let e = parseInt(document.getElementById('globalSizeEnd').value) || 42;
        if (s > e) { let t = s; s = e; e = t; }
        if (e - s > 20) { e = s + 5; }  // 限制最大跨度
        document.getElementById('globalSizeStart').value = s;
        document.getElementById('globalSizeEnd').value = e;
        return { start: s, end: e };
    }

    // 重新索引所有颜色行（明确遍历6个码段，不受其他number输入框干扰）
    function reindexColorRows() {
        const rows = document.querySelectorAll('.color-row');
        rows.forEach((row, rowIdx) => {
            const nameInput = row.querySelector('input[name^="color_name"]');
            if (nameInput) nameInput.name = 'color_name[]';
            // 使用固定class选择码段输入框，按data-seg-num排序后重命名
            const segInputs = Array.from(row.querySelectorAll('.size-segment-input'));
            segInputs.sort((a, b) => parseInt(a.dataset.segNum) - parseInt(b.dataset.segNum));
            segInputs.forEach((input, i) => {
                input.name = `size_${i+1}_${rowIdx}`;
                // 恢复正确的segIndex（防止被之前的错误逻辑污染）
                input.dataset.segIndex = i;
            });
        });
        colorIndex = rows.length;
    }

    // 创建颜色行（固定6个输入框，标签显示"码段1"~"码段6"）
    function createColorRow(idx) {
        const div = document.createElement('div');
        div.className = 'color-row';
        let html = `<div style="display:flex; gap:1rem; align-items:center; margin-bottom:1.2rem;">
                        <input type="text" name="color_name[]" placeholder="颜色名称（如：黑色）" required style="flex:1; padding:0.8rem 1rem; border:1.5px solid #e2e8f0; border-radius:20px;">
                        <button type="button" class="remove-color-btn" title="删除颜色">&times;</button>
                    </div>
                    <div style="display:grid; grid-template-columns:repeat(6,1fr); gap:1rem;">`;
        for (let i = 1; i <= 6; i++) {
            html += `<div class="size-input-cell">
                        <label style="display:block; margin-bottom:6px; font-weight:500; color:#475569;">码段${i}</label>
                        <input type="number" class="size-segment-input" name="size_${i}_${idx}" data-seg-index="${i-1}" data-seg-num="${i}" min="0" value="" placeholder="0" step="1">
                     </div>`;
        }
        html += '</div>';
        div.innerHTML = html;

        div.querySelector('.remove-color-btn').addEventListener('click', function() {
            if (document.querySelectorAll('.color-row').length <= 1) {
                alert('至少保留一个颜色');
                return;
            }
            div.remove();
            reindexColorRows();
        });
        return div;
    }

    // 初始化第一行
    container.appendChild(createColorRow(0));
    colorIndex = 1;

    document.getElementById('addColorBtn').addEventListener('click', () => {
        const currentRows = document.querySelectorAll('.color-row');
        container.appendChild(createColorRow(currentRows.length));
        reindexColorRows();
    });

    // 切换订单类型（保持原有逻辑，略作简化）
    function switchOrderType(type) {
        document.getElementById('orderTypeInput').value = type;
        document.querySelectorAll('.order-type-btn').forEach(b => b.classList.remove('active'));
        document.querySelector(`[data-type="${type}"]`).classList.add('active');

        const productCodeWrapper = document.getElementById('productCodeWrapper');
        const soleWrapper = document.getElementById('soleModelWrapper');
        const upperWrapper = document.getElementById('upperModelWrapper');
        const directSaleWrapper = document.getElementById('directSaleWrapper');
        const plasticTypeWrapper = document.getElementById('plasticTypeWrapper');
        const assemblySources = document.getElementById('assemblySourcesWrapper');

        productCodeWrapper.style.display = 'none';
        soleWrapper.style.display = 'none';
        upperWrapper.style.display = 'none';
        directSaleWrapper.style.display = 'none';
        plasticTypeWrapper.style.display = 'none';
        assemblySources.style.display = 'none';

        document.getElementById('productCode').required = false;
        document.getElementById('soleModel').required = false;
        document.getElementById('upperModel').required = false;

        if (type === 'blow') {
            soleWrapper.style.display = 'block';
            document.getElementById('soleModel').required = true;
            directSaleWrapper.style.display = 'block';
        } else if (type === 'pu') {
            soleWrapper.style.display = 'block';
            document.getElementById('soleModel').required = true;
            directSaleWrapper.style.display = 'block';
        } else if (type === 'plastic') {
            togglePlasticModel();
            plasticTypeWrapper.style.display = 'block';
        } else if (type === 'assembly') {
            productCodeWrapper.style.display = 'block';
            document.getElementById('productCode').required = true;
            soleWrapper.style.display = 'block';
            upperWrapper.style.display = 'block';
            document.getElementById('soleModel').required = true;
            document.getElementById('upperModel').required = true;
            assemblySources.style.display = 'block';
            onSoleSourceChange();
            onUpperSourceChange();
            if (document.getElementById('otherSourcesContainer').children.length === 0) {
                addOtherSourceRow();
            }
        }
        setTimeout(() => { reindexColorRows(); }, 10);
    }

    function togglePlasticModel() {
        const type = document.getElementById('plasticTypeSelect').value;
        document.getElementById('soleModelWrapper').style.display = type === 'sole' ? 'block' : 'none';
        document.getElementById('upperModelWrapper').style.display = type === 'upper' ? 'block' : 'none';
        document.getElementById('soleModel').required = type === 'sole';
        document.getElementById('upperModel').required = type === 'upper';
    }

    // ==================== 材料搜索、图片上传等函数（已补全） ====================

    // 鞋底来源切换
    function onSoleSourceChange() {
        const src = document.getElementById('soleSource').value;
        const btn = document.getElementById('selectSoleBtn');
        const info = document.getElementById('soleMaterialInfo');
        if (src === 'other') {
            btn.style.display = 'none';
            info.style.display = 'none';
            document.getElementById('soleMaterialIdHidden').value = '';
        } else {
            btn.style.display = 'inline-block';
        }
    }

    // 帮面来源切换
    function onUpperSourceChange() {
        const src = document.getElementById('upperSource').value;
        const btn = document.getElementById('selectUpperBtn');
        const info = document.getElementById('upperMaterialInfo');
        if (src === 'other') {
            btn.style.display = 'none';
            info.style.display = 'none';
            document.getElementById('upperMaterialIdHidden').value = '';
        } else {
            btn.style.display = 'inline-block';
        }
    }

    // 添加其他来源行
    function addOtherSourceRow() {
        const container = document.getElementById('otherSourcesContainer');
        const div = document.createElement('div');
        div.style.cssText = 'display:flex; gap:0.5rem; align-items:center; margin-bottom:0.5rem;';
        div.innerHTML = `<select name="other_source[]" style="flex:2; padding:0.75rem; border-radius:20px; border:1.5px solid #e2e8f0;" onchange="onOtherSourceChange(this)">
            <option value="local">本地生产</option>
            <option value="domestic">国内鞋材</option>
            <option value="other">其他来源</option>
        </select>
        <button type="button" class="btn-outline select-other-btn" style="flex:1;" onclick="searchMaterial('other', this)">选择材料</button>
        <button type="button" class="remove-color-btn" onclick="this.parentElement.remove()">&times;</button>
        <input type="hidden" name="other_material_id[]" class="other-material-id">`;
        container.appendChild(div);
    }

    function onOtherSourceChange(sel) {
        const btn = sel.parentElement.querySelector('.select-other-btn');
        btn.style.display = sel.value === 'other' ? 'none' : 'inline-block';
    }

    // 搜索材料
    function searchMaterial(type, btn) {
        currentSearchType = type;
        currentSearchBtn = btn;
        modal.style.display = 'flex';
        document.body.style.overflow = 'hidden';
        searchInput.value = '';
        performSearch('');
    }

    async function performSearch(q) {
        if (abortController) abortController.abort();
        abortController = new AbortController();
        let invType = '';
        if (currentSearchType === 'sole') {
            const src = document.getElementById('soleSource').value;
            if (src === 'local_blow') invType = 'blow_sole';
            else if (src === 'local_pu') invType = 'pu_sole';
            else if (src === 'domestic') invType = 'domestic';
            else invType = 'paint_sole';
        } else if (currentSearchType === 'upper') {
            const src = document.getElementById('upperSource').value;
            if (src === 'local_plastic') invType = 'plastic_upper';
            else if (src === 'domestic') invType = 'domestic';
            else invType = 'plastic_upper';
        } else if (currentSearchType === 'other') {
            const row = currentSearchBtn.closest('div');
            const src = row.querySelector('select').value;
            invType = src === 'domestic' ? 'domestic' : 'blow_sole';
        }
        const url = `/api/inventory/search?q=${encodeURIComponent(q)}&type=${invType}`;
        try {
            const r = await fetch(url, { signal: abortController.signal });
            const materials = await r.json();
            resultsDiv.innerHTML = materials.map(m =>
                `<div class="material-item" onclick="selectMaterial(${m.id}, '${m.product_code}', '${m.material_name}', '${m.color}')">
                    <strong>${m.product_code}</strong> - ${m.material_name}<br>
                    <small>颜色: ${m.color} | 可用: ${m.total}${m.unit || '双'}</small>
                </div>`
            ).join('');
        } catch (err) {
            if (err.name !== 'AbortError') resultsDiv.innerHTML = '<p style="color:#ef4444;">加载失败</p>';
        }
    }

    function selectMaterial(id, code, name, color) {
        if (currentSearchType === 'sole') {
            document.getElementById('soleMaterialIdHidden').value = id;
            document.getElementById('soleMaterialInfo').innerHTML = `已选: ${code} - ${name} (${color})`;
            document.getElementById('soleMaterialInfo').style.display = 'block';
        } else if (currentSearchType === 'upper') {
            document.getElementById('upperMaterialIdHidden').value = id;
            document.getElementById('upperMaterialInfo').innerHTML = `已选: ${code} - ${name} (${color})`;
            document.getElementById('upperMaterialInfo').style.display = 'block';
        } else if (currentSearchType === 'other') {
            const row = currentSearchBtn.closest('div');
            row.querySelector('.other-material-id').value = id;
            const info = document.createElement('div');
            info.style.cssText = 'margin-top:0.5rem; padding:0.5rem; background:#eef2ff; border-radius:12px; font-size:0.85rem;';
            info.innerHTML = `已选: ${code} - ${name} (${color})`;
            const oldInfo = row.querySelector('.other-material-info');
            if (oldInfo) oldInfo.remove();
            info.className = 'other-material-info';
            row.appendChild(info);
        }
        closeModal();
    }

    function closeModal() {
        modal.style.display = 'none';
        document.body.style.overflow = '';
    }

    // 图片压缩
    async function compressImage(file, maxWidth = 1920, quality = 0.85) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    let width = img.width, height = img.height;
                    if (width > maxWidth) { height = (height * maxWidth) / width; width = maxWidth; }
                    const canvas = document.createElement('canvas');
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    canvas.toBlob((blob) => {
                        if (blob) resolve(new File([blob], file.name, { type: 'image/jpeg' }));
                        else reject(new Error('压缩失败'));
                    }, 'image/jpeg', quality);
                };
                img.onerror = reject;
                img.src = e.target.result;
            };
            reader.onerror = reject;
            reader.readAsDataURL(file);
        });
    }

    function addImagePreview(url) {
        const div = document.createElement('div');
        div.style.cssText = 'position:relative; width:80px; height:80px; border-radius:12px; overflow:hidden; border:1px solid #e2e8f0;';
        div.innerHTML = `<img src="${url}" style="width:100%; height:100%; object-fit:cover;"><button type="button" style="position:absolute; top:4px; right:4px; background:rgba(0,0,0,0.5); color:white; border:none; border-radius:50%; width:20px; height:20px; cursor:pointer;" onclick="removeImage(this, '${url}')">&times;</button>`;
        imageContainer.appendChild(div);
    }

    function removeImage(btn, url) {
        const index = uploadedUrls.indexOf(url);
        if (index > -1) uploadedUrls.splice(index, 1);
        urlsInput.value = JSON.stringify(uploadedUrls);
        btn.parentElement.remove();
    }

    // 事件监听器
    searchInput.addEventListener('input', (e) => {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(() => performSearch(e.target.value.trim()), 300);
    });

    modal.addEventListener('click', (e) => {
        if (e.target === modal) closeModal();
    });

    fileInput.addEventListener('change', async (e) => {
        const files = Array.from(e.target.files);
        for (const file of files) {
            if (file.size > 5 * 1024 * 1024) {
                alert(`图片 ${file.name} 超过5MB，已跳过`);
                continue;
            }
            try {
                const compressed = await compressImage(file);
                const formData = new FormData();
                formData.append('image', compressed);
                const resp = await fetch('/api/upload_image', {
                    method: 'POST',
                    headers: { 'X-CSRFToken': getCSRFToken() },
                    body: formData
                });
                const result = await resp.json();
                if (result.success) {
                    uploadedUrls.push(result.url);
                    urlsInput.value = JSON.stringify(uploadedUrls);
                    addImagePreview(result.url);
                } else {
                    alert('上传失败: ' + result.error);
                }
            } catch (err) {
                alert('图片上传失败');
            }
        }
        fileInput.value = '';
    });

    // 表单提交处理
    document.getElementById('orderForm').addEventListener('submit', function(e) {
        reindexColorRows();
        document.querySelectorAll('.size-segment-input').forEach(i => { if (!i.value) i.value = '0'; });
        const range = getSizeRange();
        const start = range.start;
        const end = range.end;
        // 更新隐藏域
        document.getElementById('globalSizeStartHidden').value = start;
        document.getElementById('globalSizeEndHidden').value = end;

        // 使用固定class精确读取码段数据，不受其他number输入框干扰
        const rows = document.querySelectorAll('.color-row');
        let hasQty = false;
        let totalPairs = 0;

        rows.forEach((row, rowIdx) => {
            const segInputs = Array.from(row.querySelectorAll('.size-segment-input'));
            segInputs.sort((a, b) => parseInt(a.dataset.segNum) - parseInt(b.dataset.segNum));
            segInputs.forEach((input, i) => {
                const val = parseInt(input.value) || 0;
                if (val > 0) hasQty = true;
                totalPairs += val;
            });
        });

        if (!hasQty) {
            alert('请至少填写一个码段的数量');
            e.preventDefault();
            return;
        }

        // 防御性校验：确保每个颜色行都有正确的6个码段输入框
        let valid = true;
        rows.forEach((row, rowIdx) => {
            const segInputs = Array.from(row.querySelectorAll('.size-segment-input'));
            if (segInputs.length !== 6) {
                console.error(`颜色行 ${rowIdx} 码段输入框数量错误: ${segInputs.length} 个 (期望6个)`);
                valid = false;
            }
            // 校验data-seg-num是否完整（1~6）
            const segNums = segInputs.map(inp => parseInt(inp.dataset.segNum)).sort((a,b)=>a-b);
            const expected = [1,2,3,4,5,6];
            if (JSON.stringify(segNums) !== JSON.stringify(expected)) {
                console.error(`颜色行 ${rowIdx} 码段编号异常: [${segNums.join(',')}] (期望[1,2,3,4,5,6])`);
                valid = false;
            }
        });
        if (!valid) {
            alert('颜色行数据异常，请刷新页面重试');
            e.preventDefault();
            return;
        }

        // 成型指令单来源校验（略）
        // ...

        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.textContent = "提交中...";
        setTimeout(() => {
            btn.disabled = false;
            btn.innerHTML = ' 创建指令单';
        }, 3000);
    });

    // 页面初始化
    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        const type = urlParams.get('type') || 'blow';
        switchOrderType(type);
    };
</script>
{% endblock %}
